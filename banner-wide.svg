<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="600" viewBox="0 0 1920 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0f18"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="600" fill="url(#bg)"/>
  <rect width="1920" height="600" fill="url(#glow1)"/>
  <rect width="1920" height="600" fill="url(#glow2)"/>

  <!-- Content - left aligned -->
  <g transform="translate(100, 300)">
    <!-- Logo icon + Title inline -->
    <g transform="translate(0, -50)">
      <rect x="-40" y="-70" width="80" height="80" rx="20" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)"/>
      <text x="0" y="-15" text-anchor="middle" font-size="40">🎯</text>
    </g>

    <text x="60" y="0" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">AtapDigital</text>

    <!-- Subtitle -->
    <text x="60" y="50" font-family="Inter, Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">AI-Powered Social Media Toolkit</text>

    <!-- Badges row -->
    <g transform="translate(60, 100)">
      <rect x="0" y="0" width="180" height="42" rx="21" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.2)"/>
      <text x="90" y="27" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fb923c">📊 Competitor Research</text>

      <rect x="200" y="0" width="170" height="42" rx="21" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.2)"/>
      <text x="285" y="27" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fb923c">✍️ Caption Generator</text>

      <rect x="390" y="0" width="160" height="42" rx="21" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.2)"/>
      <text x="470" y="27" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fb923c">💡 Content Ideas</text>
    </g>

    <!-- Features -->
    <g transform="translate(60, 170)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">
        <tspan fill="#22c55e">✓</tspan> Purpose-Built Prompts
      </text>
      <text x="200" y="0" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">
        <tspan fill="#22c55e">✓</tspan> Export to PDF
      </text>
      <text x="380" y="0" font-family="Inter, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">
        <tspan fill="#22c55e">✓</tspan> API Integration
      </text>
      <text x="540" y="0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fb923c">Powered by Claude AI</text>
    </g>
  </g>
</svg>
