<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner - Hero 1200x630</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Glow effects */
        .glow-1 {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
        }

        .glow-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.1) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
        }

        /* Grid pattern */
        .grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .logo-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(249, 115, 22, 0.2), rgba(249, 115, 22, 0.05));
            border: 1px solid rgba(249, 115, 22, 0.3);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 32px;
            box-shadow: 0 0 60px rgba(249, 115, 22, 0.2);
        }

        h1 {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.85) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 28px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            margin-bottom: 40px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(249, 115, 22, 0.1);
            border: 1px solid rgba(249, 115, 22, 0.3);
            padding: 16px 32px;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 500;
            color: #fb923c;
        }

        .badge::before {
            content: '';
            width: 10px;
            height: 10px;
            background: #f97316;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* Features strip */
        .features {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 48px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .feature span {
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="grid"></div>

    <div class="content">
        <div class="logo-icon">🎯</div>
        <h1>AtapDigital</h1>
        <p class="subtitle">AI-Powered Social Media Toolkit</p>
        <div class="badge">
            Powered by Claude AI
        </div>
    </div>

    <div class="features">
        <div class="feature">
            <div class="feature-icon">📊</div>
            Competitor Research
        </div>
        <div class="feature">
            <div class="feature-icon">✍️</div>
            Caption Generator
        </div>
        <div class="feature">
            <div class="feature-icon">💡</div>
            Content Ideas
        </div>
        <div class="feature">
            <span>✓</span>
            Export to PDF
        </div>
    </div>
</body>
</html>
