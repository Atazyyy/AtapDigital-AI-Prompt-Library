<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid pattern -->
  <g stroke="rgba(255,255,255,0.02)" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="50" y1="0" x2="50" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="250" y1="0" x2="250" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="350" y1="0" x2="350" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="550" y1="0" x2="550" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="650" y1="0" x2="650" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="850" y1="0" x2="850" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="950" y1="0" x2="950" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="1150" y1="0" x2="1150" y2="630"/>
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Content -->
  <g transform="translate(600, 280)">
    <!-- Logo icon -->
    <rect x="-50" y="-90" width="100" height="100" rx="24" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.3)" stroke-width="1" filter="url(#glow)"/>
    <text x="0" y="-20" text-anchor="middle" font-size="50">🎯</text>

    <!-- Title -->
    <text x="0" y="50" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">AtapDigital</text>

    <!-- Subtitle -->
    <text x="0" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">AI-Powered Social Media Toolkit</text>

    <!-- Badge -->
    <rect x="-140" y="130" width="280" height="56" rx="28" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
    <circle cx="-110" cy="158" r="8" fill="#f97316">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="-85" y="164" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#fb923c">Powered by Claude AI</text>
  </g>

  <!-- Features strip -->
  <g transform="translate(600, 580)">
    <text x="-320" y="0" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">📊 Competitor Research</text>
    <text x="-100" y="0" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">✍️ Caption Generator</text>
    <text x="100" y="0" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">💡 Content Ideas</text>
    <text x="300" y="0" font-family="Inter, Arial, sans-serif" font-size="16" fill="#22c55e">✓ Export to PDF</text>
  </g>
</svg>
