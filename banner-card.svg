<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12121a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background with border radius simulation -->
  <rect width="600" height="400" rx="20" fill="url(#bg)"/>
  <rect x="2" y="2" width="596" height="396" rx="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Glow -->
  <ellipse cx="300" cy="200" rx="300" ry="200" fill="rgba(249,115,22,0.05)"/>

  <!-- Content -->
  <g transform="translate(300, 160)">
    <!-- Icon -->
    <rect x="-45" y="-50" width="90" height="90" rx="20" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
    <text x="0" y="-5" text-anchor="middle" font-size="45">🎯</text>

    <!-- Title -->
    <text x="0" y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="white">AtapDigital</text>

    <!-- Subtitle -->
    <text x="0" y="115" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">AI Toolkit</text>
  </g>

  <!-- Tags -->
  <g transform="translate(300, 320)">
    <rect x="-130" y="-18" width="75" height="36" rx="8" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>
    <text x="-92" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#fb923c">📊 Riset</text>

    <rect x="-45" y="-18" width="90" height="36" rx="8" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#fb923c">✍️ Caption</text>

    <rect x="55" y="-18" width="75" height="36" rx="8" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>
    <text x="92" y="5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#fb923c">💡 Ide</text>
  </g>
</svg>
